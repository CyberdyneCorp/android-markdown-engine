name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" >/dev/null || true

      - name: Unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Assemble (library AARs + sample APK)
        run: ./gradlew assembleDebug --stacktrace

      - name: Compile instrumented tests
        run: ./gradlew compileDebugAndroidTestKotlin --stacktrace

      - name: Validate OpenSpec
        run: npx --yes @fission-ai/openspec@latest validate --all --strict
